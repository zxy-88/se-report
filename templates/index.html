<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SE Report</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-chart-treemap@2.3.1"></script>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/jquery-ui-dist/jquery-ui.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/pivottable/dist/pivot.min.css">
    <script src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jquery-ui-dist/jquery-ui.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/pivottable/dist/pivot.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/plotly.js-dist-min/plotly.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/pivottable/dist/plotly_renderers.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background: #0f172a; color: #e2e8f0;
            display: flex; height: 100vh; overflow: hidden;
        }

        /* Sidebar */
        .sidebar {
            width: 260px; min-width: 260px; background: #1e293b;
            border-right: 1px solid #334155; display: flex; flex-direction: column;
            transition: margin-left 0.3s ease;
        }
        .sidebar.collapsed { margin-left: -260px; }
        .sidebar-header {
            padding: 16px 20px; border-bottom: 1px solid #334155;
            display: flex; justify-content: space-between; align-items: center;
        }
        .sidebar-header h3 { font-size: 14px; color: #94a3b8; text-transform: uppercase; letter-spacing: 1px; }
        .sidebar-close {
            background: none; border: none; color: #64748b; font-size: 20px;
            cursor: pointer; line-height: 1;
        }
        .sidebar-close:hover { color: #e2e8f0; }
        .sidebar-actions {
            display: flex; gap: 6px; padding: 12px 20px; border-bottom: 1px solid #334155;
        }
        .sidebar-actions button {
            flex: 1; padding: 6px; font-size: 11px; border-radius: 6px;
            border: 1px solid #475569; background: transparent; color: #94a3b8;
            cursor: pointer; transition: all 0.15s;
        }
        .sidebar-actions button:hover { background: #334155; color: #e2e8f0; }
        .col-list {
            list-style: none; flex: 1; overflow-y: auto; padding: 8px 12px;
        }
        .col-list li { padding: 1px 0; }
        .col-list label {
            font-size: 13px; cursor: pointer; display: flex; align-items: center;
            gap: 8px; padding: 5px 8px; border-radius: 6px; transition: background 0.15s;
            color: #cbd5e1;
        }
        .col-list label:hover { background: #334155; }
        .col-list input[type=checkbox] { accent-color: #3b82f6; }

        /* Main */
        .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

        /* Toolbar */
        .toolbar {
            padding: 16px 24px; background: #1e293b;
            border-bottom: 1px solid #334155;
            display: flex; align-items: center; gap: 16px; flex-wrap: wrap;
        }
        .toolbar-toggle {
            background: none; border: none; color: #94a3b8; cursor: pointer;
            font-size: 20px; padding: 4px; display: flex; align-items: center;
        }
        .toolbar-toggle:hover { color: #e2e8f0; }
        .toolbar-toggle svg { width: 22px; height: 22px; }
        .toolbar h1 { font-size: 18px; font-weight: 700; color: #f1f5f9; margin-right: auto; }
        .toolbar input[type=date] {
            padding: 7px 12px; border: 1px solid #475569; border-radius: 8px;
            background: #0f172a; color: #e2e8f0; font-size: 13px;
        }
        .toolbar input[type=date]::-webkit-calendar-picker-indicator { filter: invert(0.7); }
        .toolbar-label { font-size: 12px; color: #64748b; font-weight: 600; text-transform: uppercase; }
        .toolbar-group { display: flex; align-items: center; gap: 8px; }

        /* Radio pills */
        .pill-group { display: flex; gap: 0; }
        .pill-group input { display: none; }
        .pill-group label {
            padding: 7px 16px; font-size: 13px; cursor: pointer;
            background: #0f172a; border: 1px solid #475569; color: #94a3b8;
            transition: all 0.15s;
        }
        .pill-group label:first-of-type { border-radius: 8px 0 0 8px; }
        .pill-group label:last-of-type { border-radius: 0 8px 8px 0; border-left: none; }
        .pill-group input:checked + label {
            background: #3b82f6; border-color: #3b82f6; color: #fff;
        }

        /* Fetch button */
        .btn-fetch {
            padding: 7px 28px; background: #3b82f6; color: #fff; border: none;
            border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer;
            transition: background 0.15s;
        }
        .btn-fetch:hover { background: #2563eb; }
        .btn-fetch:disabled { background: #1e3a5f; color: #64748b; cursor: not-allowed; }

        /* Progress bar */
        .progress-container {
            display: none; align-items: center; gap: 12px; margin-bottom: 12px;
        }
        .progress-container.active { display: flex; }
        .progress-bar-wrap {
            flex: 1; height: 8px; background: #334155; border-radius: 4px; overflow: hidden;
        }
        .progress-bar-fill {
            height: 100%; width: 0%; background: #3b82f6; border-radius: 4px;
            transition: width 0.3s ease;
        }
        .progress-text { font-size: 12px; color: #94a3b8; min-width: 180px; }
        .btn-cancel {
            padding: 5px 16px; background: #dc2626; color: #fff; border: none;
            border-radius: 6px; font-size: 12px; cursor: pointer; white-space: nowrap;
        }
        .btn-cancel:hover { background: #b91c1c; }

        /* Export button */
        .btn-export {
            padding: 7px 20px; background: #22c55e; color: #fff; border: none;
            border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer;
            transition: background 0.15s; display: none;
        }
        .btn-export:hover { background: #16a34a; }

        /* Content area */
        .content { flex: 1; overflow: auto; padding: 16px 24px; }
        #status { margin-bottom: 12px; font-size: 13px; color: #94a3b8; }
        #status.error { color: #f87171; }

        /* Table */
        table {
            width: 100%; border-collapse: separate; border-spacing: 0;
            background: #1e293b; border-radius: 10px; overflow: hidden;
        }
        thead { position: sticky; top: 0; z-index: 10; }
        thead th {
            background: #334155; color: #94a3b8; font-size: 11px;
            text-transform: uppercase; letter-spacing: 0.5px;
            padding: 10px 14px; text-align: left; font-weight: 600;
            border-bottom: 1px solid #475569;
            position: relative; cursor: pointer; user-select: none;
        }
        thead th .th-content {
            display: flex; align-items: center; justify-content: space-between; gap: 6px;
        }
        thead th .filter-icon {
            width: 14px; height: 14px; opacity: 0.4; flex-shrink: 0;
            transition: opacity 0.15s;
        }
        thead th:hover .filter-icon { opacity: 0.8; }
        thead th.filtered .filter-icon { opacity: 1; color: #3b82f6; }
        td {
            padding: 9px 14px; font-size: 13px; color: #cbd5e1;
            border-bottom: 1px solid #1e293b; white-space: nowrap;
        }
        tbody tr { background: #0f172a; transition: background 0.1s; }
        tbody tr:nth-child(even) { background: #162032; }
        tbody tr:hover { background: #1e3a5f; }

        /* Filter dropdown */
        .filter-dropdown {
            position: fixed; min-width: 240px;
            background: #1e293b; border: 1px solid #475569; border-radius: 8px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.4); z-index: 200;
            padding: 8px 0;
        }
        .filter-dropdown .fd-search {
            padding: 0 10px 8px; border-bottom: 1px solid #334155; margin-bottom: 4px;
        }
        .filter-dropdown .fd-search input {
            width: 100%; padding: 6px 10px; font-size: 12px;
            background: #0f172a; color: #e2e8f0; border: 1px solid #475569;
            border-radius: 6px; outline: none;
        }
        .filter-dropdown .fd-search input:focus { border-color: #3b82f6; }
        .filter-dropdown .fd-search input::placeholder { color: #64748b; }
        .filter-dropdown .fd-list {
            max-height: 200px; overflow-y: auto; padding: 0 6px;
            list-style: none;
        }
        .filter-dropdown .fd-list li { padding: 0; }
        .filter-dropdown .fd-list label {
            display: flex; align-items: center; gap: 8px;
            padding: 4px 8px; font-size: 12px; color: #cbd5e1;
            border-radius: 4px; cursor: pointer; white-space: nowrap;
            overflow: hidden; text-overflow: ellipsis;
        }
        .filter-dropdown .fd-list label:hover { background: #334155; }
        .filter-dropdown .fd-list input[type=checkbox] { accent-color: #3b82f6; flex-shrink: 0; }
        .filter-dropdown .fd-actions {
            display: flex; gap: 6px; padding: 8px 10px 4px;
            border-top: 1px solid #334155; margin-top: 4px;
        }
        .filter-dropdown .fd-actions button {
            flex: 1; padding: 5px; font-size: 11px; border-radius: 6px;
            cursor: pointer; transition: all 0.15s;
        }
        .filter-dropdown .fd-ok {
            background: #3b82f6; color: #fff; border: none;
        }
        .filter-dropdown .fd-ok:hover { background: #2563eb; }
        .filter-dropdown .fd-cancel {
            background: transparent; color: #94a3b8; border: 1px solid #475569;
        }
        .filter-dropdown .fd-cancel:hover { background: #334155; color: #e2e8f0; }

        /* Dashboard */
        #dashboardView { display: none; }
        .dash-cards {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 14px; margin-bottom: 20px;
        }
        .dash-card {
            background: #1e293b; border: 1px solid #334155; border-radius: 12px;
            padding: 20px; display: flex; align-items: center; gap: 16px;
            border-left: 4px solid;
        }
        .dash-card.blue { border-left-color: #3b82f6; }
        .dash-card.green { border-left-color: #22c55e; }
        .dash-card.amber { border-left-color: #f59e0b; }
        .dash-card.rose { border-left-color: #f43f5e; }
        .dash-card .card-icon {
            width: 44px; height: 44px; border-radius: 10px; display: flex;
            align-items: center; justify-content: center; flex-shrink: 0;
        }
        .dash-card .card-icon svg { width: 22px; height: 22px; }
        .dash-card.blue .card-icon { background: rgba(59,130,246,0.15); color: #3b82f6; }
        .dash-card.green .card-icon { background: rgba(34,197,94,0.15); color: #22c55e; }
        .dash-card.amber .card-icon { background: rgba(245,158,11,0.15); color: #f59e0b; }
        .dash-card.rose .card-icon { background: rgba(244,63,94,0.15); color: #f43f5e; }
        .dash-card .card-info { display: flex; flex-direction: column; }
        .dash-card .card-value { font-size: 28px; font-weight: 800; color: #f1f5f9; line-height: 1.1; }
        .dash-card .card-label { font-size: 12px; color: #64748b; margin-top: 2px; }

        .dash-charts {
            display: grid; grid-template-columns: 1fr 1fr; gap: 14px;
        }
        .chart-card {
            background: #1e293b; border: 1px solid #334155; border-radius: 12px;
            padding: 16px 16px 8px;
        }
        .chart-card h4 {
            font-size: 13px; color: #94a3b8; margin-bottom: 8px; font-weight: 600;
            text-transform: uppercase; letter-spacing: 0.3px;
        }
        .chart-card .chart-wrap { position: relative; height: 300px; }
        /* Pivot dark theme */
        #pivotView { overflow: auto; }
        #pivotOutput .pvtUi { color: #e2e8f0; background: transparent; border: none; }
        #pivotOutput .pvtUi td, #pivotOutput .pvtUi th { background: transparent; }
        #pivotOutput select, #pivotOutput .pvtSearch input {
            background: #1e293b; color: #e2e8f0; border: 1px solid #475569; border-radius: 4px;
            padding: 4px 6px;
        }
        #pivotOutput .pvtAxisContainer, #pivotOutput .pvtVals {
            background: #1e293b; border: 1px solid #334155; border-radius: 8px; padding: 8px;
        }
        #pivotOutput .pvtAxisContainer li span.pvtAttr {
            background: #334155; border: 1px solid #475569; color: #e2e8f0; border-radius: 6px;
            padding: 4px 10px; font-size: 12px;
        }
        #pivotOutput .pvtAxisContainer li span.pvtAttr:hover { background: #3b82f6; border-color: #3b82f6; }
        #pivotOutput table.pvtTable {
            background: #1e293b; border-collapse: separate; border-spacing: 0;
            border-radius: 8px; overflow: hidden; font-size: 12px;
        }
        #pivotOutput table.pvtTable thead th {
            background: #334155; color: #94a3b8; border: 1px solid #475569;
            padding: 6px 10px; font-weight: 600;
            white-space: normal; word-break: break-word; max-width: 140px;
            line-height: 1.25; vertical-align: middle;
        }
        #pivotOutput table.pvtTable tbody td {
            background: #0f172a; color: #cbd5e1; border: 1px solid #1e293b; padding: 6px 10px;
        }
        #pivotOutput table.pvtTable tbody td.pvtTotal,
        #pivotOutput table.pvtTable tbody th.pvtTotalLabel,
        #pivotOutput table.pvtTable thead th.pvtTotalLabel {
            background: #162032; color: #f1f5f9; font-weight: 700;
        }
        #pivotOutput .pvtFilterBox {
            background: #1e293b; border: 1px solid #475569; border-radius: 8px;
            color: #e2e8f0; box-shadow: 0 8px 24px rgba(0,0,0,0.4);
        }
        #pivotOutput .pvtFilterBox button {
            background: #3b82f6; color: #fff; border: none; border-radius: 6px;
            padding: 4px 12px; cursor: pointer;
        }
        #pivotOutput .pvtFilterBox input[type=text] {
            background: #0f172a; color: #e2e8f0; border: 1px solid #475569; border-radius: 4px;
        }
        #pivotOutput .pvtCheckContainer label { color: #cbd5e1; }
        #pivotOutput .pvtRendererArea { padding: 0; }

        /* Floating sticky horizontal scrollbar for pivot */
        #pivotHScroll {
            position: fixed;
            height: 14px;
            overflow-x: scroll;
            overflow-y: hidden;
            background: #0f172a;
            z-index: 100;
            display: none;
        }
        #pivotHScroll > div { height: 1px; }
        body.light #pivotHScroll { background: #f1f5f9; }
        /* Hide the native scrollbar of #pivotView (floating one above replaces it) */
        #pivotView { scrollbar-width: none; }
        #pivotView::-webkit-scrollbar { display: none; }

        /* Theme & Font controls */
        .toolbar-controls {
            display: flex; align-items: center; gap: 6px; margin-left: auto;
        }
        .toolbar-controls button {
            background: none; border: 1px solid #475569; color: #94a3b8;
            border-radius: 6px; width: 32px; height: 32px; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            font-size: 14px; transition: all 0.15s;
        }
        .toolbar-controls button:hover { background: #334155; color: #e2e8f0; }
        .toolbar-controls .font-label {
            font-size: 11px; color: #64748b; font-weight: 600; margin: 0 2px;
        }

        /* Light theme */
        body.light { background: #f1f5f9; color: #1e293b; }
        body.light .sidebar { background: #fff; border-right-color: #e2e8f0; }
        body.light .sidebar-header { border-bottom-color: #e2e8f0; }
        body.light .sidebar-header h3 { color: #64748b; }
        body.light .sidebar-close { color: #94a3b8; }
        body.light .sidebar-close:hover { color: #1e293b; }
        body.light .sidebar-actions button { border-color: #cbd5e1; color: #64748b; }
        body.light .sidebar-actions button:hover { background: #f1f5f9; color: #1e293b; }
        body.light .sidebar-actions { border-bottom-color: #e2e8f0; }
        body.light .col-list label { color: #334155; }
        body.light .col-list label:hover { background: #f1f5f9; }
        body.light .toolbar { background: #fff; border-bottom-color: #e2e8f0; }
        body.light .toolbar h1 { color: #0f172a; }
        body.light .toolbar input[type=date] { background: #f8fafc; border-color: #cbd5e1; color: #1e293b; }
        body.light .toolbar input[type=date]::-webkit-calendar-picker-indicator { filter: none; }
        body.light .toolbar-label { color: #94a3b8; }
        body.light .toolbar-controls button { border-color: #cbd5e1; color: #64748b; }
        body.light .toolbar-controls button:hover { background: #f1f5f9; color: #1e293b; }
        body.light .pill-group label { background: #f8fafc; border-color: #cbd5e1; color: #64748b; }
        body.light .pill-group input:checked + label { background: #3b82f6; border-color: #3b82f6; color: #fff; }
        body.light .content { background: #f1f5f9; }
        body.light #status { color: #64748b; }
        body.light table { background: #fff; }
        body.light thead th { background: #f1f5f9; color: #64748b; border-bottom-color: #e2e8f0; }
        body.light td { color: #334155; border-bottom-color: #f1f5f9; }
        body.light tbody tr { background: #fff; }
        body.light tbody tr:nth-child(even) { background: #f8fafc; }
        body.light tbody tr:hover { background: #eff6ff; }
        body.light .filter-dropdown { background: #fff; border-color: #e2e8f0; box-shadow: 0 8px 24px rgba(0,0,0,0.1); }
        body.light .filter-dropdown .fd-search { border-bottom-color: #e2e8f0; }
        body.light .filter-dropdown .fd-search input { background: #f8fafc; color: #1e293b; border-color: #cbd5e1; }
        body.light .filter-dropdown .fd-list label { color: #334155; }
        body.light .filter-dropdown .fd-list label:hover { background: #f1f5f9; }
        body.light .filter-dropdown .fd-actions { border-top-color: #e2e8f0; }
        body.light .filter-dropdown .fd-cancel { color: #64748b; border-color: #cbd5e1; }
        body.light .filter-dropdown .fd-cancel:hover { background: #f1f5f9; color: #1e293b; }
        body.light .dash-card { background: #fff; border-color: #e2e8f0; }
        body.light .dash-card .card-value { color: #0f172a; }
        body.light .dash-card .card-label { color: #94a3b8; }
        body.light .chart-card { background: #fff; border-color: #e2e8f0; }
        body.light .chart-card h4 { color: #64748b; }
        body.light .progress-bar-wrap { background: #e2e8f0; }
        body.light .progress-text { color: #64748b; }
        body.light #pivotOutput .pvtUi { color: #1e293b; }
        body.light #pivotOutput .pvtAxisContainer,
        body.light #pivotOutput .pvtVals { background: #fff; border-color: #e2e8f0; }
        body.light #pivotOutput .pvtAxisContainer li span.pvtAttr { background: #f1f5f9; border-color: #cbd5e1; color: #334155; }
        body.light #pivotOutput .pvtAxisContainer li span.pvtAttr:hover { background: #3b82f6; border-color: #3b82f6; color: #fff; }
        body.light #pivotOutput select,
        body.light #pivotOutput .pvtSearch input { background: #f8fafc; color: #1e293b; border-color: #cbd5e1; }
        body.light #pivotOutput table.pvtTable { background: #fff; }
        body.light #pivotOutput table.pvtTable thead th { background: #f1f5f9; color: #64748b; border-color: #e2e8f0; }
        body.light #pivotOutput table.pvtTable tbody td { background: #fff; color: #334155; border-color: #f1f5f9; }
        body.light #pivotOutput table.pvtTable tbody td.pvtTotal,
        body.light #pivotOutput table.pvtTable tbody th.pvtTotalLabel,
        body.light #pivotOutput table.pvtTable thead th.pvtTotalLabel { background: #f8fafc; color: #0f172a; }
        body.light #pivotOutput .pvtFilterBox { background: #fff; border-color: #e2e8f0; color: #1e293b; box-shadow: 0 8px 24px rgba(0,0,0,0.1); }
        body.light #pivotOutput .pvtFilterBox input[type=text] { background: #f8fafc; color: #1e293b; border-color: #cbd5e1; }
        body.light #pivotOutput .pvtCheckContainer label { color: #334155; }

        /* Responsive */
        @media (max-width: 768px) {
            .sidebar {
                position: fixed; top: 0; left: 0; bottom: 0; z-index: 100;
            }
            .sidebar.collapsed { margin-left: 0; transform: translateX(-260px); }
            .toolbar { padding: 12px 16px; gap: 10px; }
            .toolbar h1 { font-size: 16px; width: 100%; margin-right: 0; }
            .toolbar-group { flex: 1; min-width: 0; }
            .toolbar input[type=date] { width: 100%; min-width: 0; }
            .pill-group label { padding: 7px 10px; font-size: 12px; }
            .btn-fetch, .btn-export { flex: 1; }
            .content { padding: 12px 16px; }
            table { display: block; overflow-x: auto; }
            .dash-charts { grid-template-columns: 1fr; }
            .dash-cards { grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); }
            .dash-card .card-value { font-size: 22px; }
        }
    </style>
</head>
<body>
    <!-- Sidebar -->
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <h3>Columns</h3>
            <button class="sidebar-close" id="closeSidebar">&times;</button>
        </div>
        <div class="sidebar-actions">
            <button type="button" id="checkAll">Select All</button>
            <button type="button" id="uncheckAll">Deselect All</button>
        </div>
        <ul class="col-list" id="colList"></ul>
    </div>

    <!-- Main -->
    <div class="main">
        <div class="toolbar">
            <button class="toolbar-toggle" id="toggleSidebar" title="Toggle columns">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/>
                    <rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/>
                </svg>
            </button>
            <h1>SE Report</h1>
            <form id="reportForm" style="display:contents;">
                <div class="toolbar-group">
                    <span class="toolbar-label">From</span>
                    <input type="date" id="date_from" name="date_from" required>
                </div>
                <div class="toolbar-group">
                    <span class="toolbar-label">To</span>
                    <input type="date" id="date_to" name="date_to" required>
                </div>
                <div class="pill-group">
                    <input type="radio" name="report_type" value="enquiry" id="rt_enquiry" checked>
                    <label for="rt_enquiry">Enquiry</label>
                    <input type="radio" name="report_type" value="closeClaim" id="rt_close">
                    <label for="rt_close">Close Claim</label>
                </div>
                <button type="submit" class="btn-fetch" id="submitBtn">Fetch</button>
            </form>
            <button class="btn-export" id="exportBtn">Export Excel</button>
            <div class="pill-group" id="viewToggle" style="margin-left:8px;">
                <input type="radio" name="view" value="table" id="v_table" checked>
                <label for="v_table">Table</label>
                <input type="radio" name="view" value="dashboard" id="v_dashboard">
                <label for="v_dashboard">Dashboard</label>
                <input type="radio" name="view" value="pivot" id="v_pivot">
                <label for="v_pivot" style="border-left:none;">Pivot</label>
            </div>
            <div class="toolbar-controls">
                <button id="fontDown" title="ลดขนาดตัวอักษร">A-</button>
                <span class="font-label" id="fontSizeLabel">13</span>
                <button id="fontUp" title="เพิ่มขนาดตัวอักษร">A+</button>
                <button id="themeToggle" title="สลับธีม">
                    <svg id="themeIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18">
                        <circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
                    </svg>
                </button>
            </div>
        </div>

        <div class="content">
            <div id="status"></div>
            <div class="progress-container" id="progressContainer">
                <div class="progress-bar-wrap">
                    <div class="progress-bar-fill" id="progressFill"></div>
                </div>
                <span class="progress-text" id="progressText">Connecting...</span>
                <button class="btn-cancel" id="cancelBtn">Cancel</button>
            </div>

            <div id="tableView">
                <table id="reportTable" style="display:none;">
                    <thead id="tableHead"></thead>
                    <tbody id="tableBody"></tbody>
                </table>
            </div>

            <div id="dashboardView">
                <div id="dashFilterInfo" style="margin-bottom:12px; font-size:13px; color:#64748b;"></div>
                <div class="dash-cards" id="dashCards"></div>
                <div class="dash-charts" id="dashCharts"></div>
            </div>

            <div id="pivotView" style="display:none;">
                <div id="pivotOutput"></div>
            </div>
        </div>
    </div>

    <script>
        const COLUMN_MAP = {{ column_map | tojson }};
        const FILTER_SVG = `<svg class="filter-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/></svg>`;

        const form = document.getElementById('reportForm');
        const status = document.getElementById('status');
        const thead = document.getElementById('tableHead');
        const tbody = document.getElementById('tableBody');
        const table = document.getElementById('reportTable');
        const btn = document.getElementById('submitBtn');
        const sidebar = document.getElementById('sidebar');
        const colList = document.getElementById('colList');

        const today = new Date().toISOString().slice(0, 10);
        document.getElementById('date_from').value = today;
        document.getElementById('date_to').value = today;

        // ========== THEME TOGGLE ==========
        const MOON_SVG = '<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79Z"/>';
        const SUN_SVG = '<circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>';
        const themeIcon = document.getElementById('themeIcon');

        function applyTheme(theme) {
            document.body.classList.toggle('light', theme === 'light');
            themeIcon.innerHTML = theme === 'light' ? MOON_SVG : SUN_SVG;
            localStorage.setItem('se_theme', theme);
        }
        applyTheme(localStorage.getItem('se_theme') || 'dark');

        document.getElementById('themeToggle').addEventListener('click', () => {
            applyTheme(document.body.classList.contains('light') ? 'dark' : 'light');
            if (typeof dashboardView !== 'undefined' && dashboardView.style.display !== 'none' && lastRecords) buildDashboard();
        });

        // ========== FONT SIZE ==========
        const fontSizeLabel = document.getElementById('fontSizeLabel');
        let fontSize = parseInt(localStorage.getItem('se_font_size') || '13');

        function applyFontSize(size) {
            fontSize = Math.max(10, Math.min(20, size));
            document.documentElement.style.setProperty('--base-font', fontSize + 'px');
            document.querySelectorAll('td, thead th').forEach(el => el.style.fontSize = fontSize + 'px');
            document.querySelectorAll('.col-list label').forEach(el => el.style.fontSize = fontSize + 'px');
            document.querySelectorAll('#pivotOutput td, #pivotOutput th, #pivotOutput .pvtAttr, #pivotOutput select, #pivotOutput .pvtFilterBox label').forEach(el => el.style.fontSize = fontSize + 'px');
            fontSizeLabel.textContent = fontSize;
            localStorage.setItem('se_font_size', fontSize);
        }
        applyFontSize(fontSize);

        document.getElementById('fontUp').addEventListener('click', () => applyFontSize(fontSize + 1));
        document.getElementById('fontDown').addEventListener('click', () => applyFontSize(fontSize - 1));

        // Sidebar
        document.getElementById('toggleSidebar').addEventListener('click', () => sidebar.classList.toggle('collapsed'));
        document.getElementById('closeSidebar').addEventListener('click', () => sidebar.classList.add('collapsed'));
        document.getElementById('checkAll').addEventListener('click', () => {
            colList.querySelectorAll('input[type=checkbox]').forEach(cb => cb.checked = true);
            saveColumnPrefs();
            if (lastRecords) renderTable();
        });
        document.getElementById('uncheckAll').addEventListener('click', () => {
            colList.querySelectorAll('input[type=checkbox]').forEach(cb => cb.checked = false);
            saveColumnPrefs();
            if (lastRecords) renderTable();
        });

        function getColumnPrefs(reportType) {
            try {
                const saved = localStorage.getItem('se_col_prefs_' + reportType);
                return saved ? JSON.parse(saved) : null;
            } catch { return null; }
        }

        function saveColumnPrefs() {
            const rt = document.querySelector('input[name=report_type]:checked').value;
            const prefs = {};
            colList.querySelectorAll('input[type=checkbox]').forEach(cb => {
                prefs[cb.value] = cb.checked;
            });
            localStorage.setItem('se_col_prefs_' + rt, JSON.stringify(prefs));
        }

        function buildColumnCheckboxes(reportType) {
            const cols = COLUMN_MAP[reportType] || [];
            const prefs = getColumnPrefs(reportType);
            colList.innerHTML = '';
            cols.forEach(([key, label]) => {
                const li = document.createElement('li');
                const lbl = document.createElement('label');
                const cb = document.createElement('input');
                cb.type = 'checkbox'; cb.value = key; cb.dataset.label = label;
                cb.checked = prefs ? (prefs[key] !== false) : true;
                lbl.appendChild(cb);
                lbl.appendChild(document.createTextNode(label));
                li.appendChild(lbl);
                colList.appendChild(li);
            });
        }

        function getSelectedColumns() {
            const selected = [];
            colList.querySelectorAll('input[type=checkbox]:checked').forEach(cb => {
                selected.push({ key: cb.value, label: cb.dataset.label });
            });
            return selected;
        }

        buildColumnCheckboxes('enquiry');
        if (window.matchMedia('(max-width: 768px)').matches) sidebar.classList.add('collapsed');

        document.querySelectorAll('input[name=report_type]').forEach(radio => {
            radio.addEventListener('change', (e) => {
                buildColumnCheckboxes(e.target.value);
                thead.innerHTML = ''; tbody.innerHTML = '';
                table.style.display = 'none'; status.textContent = '';
                lastRecords = null; columnFilters = {};
                document.getElementById('dashFilterInfo').textContent = '';
                document.getElementById('dashCards').innerHTML = '';
                document.getElementById('dashCharts').innerHTML = '';
                destroyCharts();
            });
        });

        // --- Column filter state: { key: Set of allowed values } ---
        let lastRecords = null;
        let columnFilters = {};
        let openDropdown = null;

        let openDropdownTh = null;

        // Close dropdown on outside click
        document.addEventListener('click', (e) => {
            if (openDropdown && !openDropdown.contains(e.target) && !e.target.closest('th')) {
                closeDropdown();
            }
        });

        function getUniqueValues(key) {
            if (!lastRecords) return [];
            const vals = new Set();
            let hasBlank = false;
            lastRecords.forEach(r => {
                const v = r[key];
                if (v === null || v === undefined || String(v).trim() === '') hasBlank = true;
                else vals.add(String(v));
            });
            const sorted = [...vals].sort((a, b) => a.localeCompare(b, 'th'));
            if (hasBlank) sorted.push('');
            return sorted;
        }

        function openFilterDropdown(th, colKey) {
            // close any open
            closeDropdown();

            const rect = th.getBoundingClientRect();
            const dd = document.createElement('div');
            dd.className = 'filter-dropdown';
            // position near the column header
            let left = rect.left;
            if (left + 240 > window.innerWidth) left = window.innerWidth - 250;
            dd.style.top = rect.bottom + 4 + 'px';
            dd.style.left = left + 'px';
            dd.addEventListener('click', e => e.stopPropagation());

            const uniqueVals = getUniqueValues(colKey);
            const currentFilter = columnFilters[colKey];

            // search
            const searchDiv = document.createElement('div');
            searchDiv.className = 'fd-search';
            const searchInput = document.createElement('input');
            searchInput.type = 'text'; searchInput.placeholder = 'Search...';
            searchDiv.appendChild(searchInput);
            dd.appendChild(searchDiv);

            // list
            const ul = document.createElement('ul');
            ul.className = 'fd-list';

            // (Select All)
            const selAllLi = document.createElement('li');
            const selAllLabel = document.createElement('label');
            const selAllCb = document.createElement('input');
            selAllCb.type = 'checkbox';
            selAllCb.checked = !currentFilter;
            selAllCb.dataset.selectAll = '1';
            selAllLabel.appendChild(selAllCb);
            selAllLabel.appendChild(document.createTextNode('(Select All)'));
            selAllLi.appendChild(selAllLabel);
            ul.appendChild(selAllLi);

            // value items
            uniqueVals.forEach(val => {
                const li = document.createElement('li');
                const lbl = document.createElement('label');
                const cb = document.createElement('input');
                cb.type = 'checkbox'; cb.dataset.val = val;
                cb.checked = !currentFilter || currentFilter.has(val);
                lbl.appendChild(cb);
                lbl.appendChild(document.createTextNode(val === '' ? '(Blanks)' : val));
                li.appendChild(lbl);
                ul.appendChild(li);
            });

            dd.appendChild(ul);

            // select all logic
            selAllCb.addEventListener('change', () => {
                ul.querySelectorAll('input[data-val]').forEach(cb => {
                    if (cb.closest('li').style.display !== 'none') cb.checked = selAllCb.checked;
                });
            });

            // search filter
            searchInput.addEventListener('input', () => {
                const q = searchInput.value.toLowerCase();
                ul.querySelectorAll('li').forEach(li => {
                    if (li.querySelector('[data-select-all]')) return;
                    const text = li.textContent.toLowerCase();
                    li.style.display = text.includes(q) ? '' : 'none';
                });
            });

            // actions
            const actionsDiv = document.createElement('div');
            actionsDiv.className = 'fd-actions';

            const okBtn = document.createElement('button');
            okBtn.textContent = 'OK'; okBtn.className = 'fd-ok';
            okBtn.addEventListener('click', () => {
                const checked = new Set();
                ul.querySelectorAll('input[data-val]').forEach(cb => {
                    if (cb.checked) checked.add(cb.dataset.val);
                });
                if (checked.size === uniqueVals.length) {
                    delete columnFilters[colKey];
                    th.classList.remove('filtered');
                } else {
                    columnFilters[colKey] = checked;
                    th.classList.add('filtered');
                }
                closeDropdown();
                renderRows();
            });

            const cancelBtn = document.createElement('button');
            cancelBtn.textContent = 'Cancel'; cancelBtn.className = 'fd-cancel';
            cancelBtn.addEventListener('click', () => closeDropdown());

            actionsDiv.appendChild(okBtn);
            actionsDiv.appendChild(cancelBtn);
            dd.appendChild(actionsDiv);

            document.body.appendChild(dd);
            openDropdown = dd;
            openDropdownTh = th;
            searchInput.focus();
        }

        function closeDropdown() {
            if (openDropdown) { openDropdown.remove(); openDropdown = null; openDropdownTh = null; }
        }

        function applyColumnFilters(records) {
            const keys = Object.keys(columnFilters);
            if (keys.length === 0) return records;
            return records.filter(record =>
                keys.every(key => {
                    const allowed = columnFilters[key];
                    const val = record[key];
                    const str = (val === null || val === undefined || String(val).trim() === '') ? '' : String(val);
                    return allowed.has(str);
                })
            );
        }

        let currentSelected = [];

        function renderTable() {
            if (!lastRecords || lastRecords.length === 0) return;
            currentSelected = getSelectedColumns();
            if (currentSelected.length === 0) {
                thead.innerHTML = ''; tbody.innerHTML = '';
                table.style.display = 'none';
                status.textContent = `Total: ${lastRecords.length} records (no columns selected)`;
                return;
            }

            thead.innerHTML = '';
            tbody.innerHTML = '';

            const headerRow = document.createElement('tr');
            currentSelected.forEach(col => {
                const th = document.createElement('th');
                const content = document.createElement('div');
                content.className = 'th-content';
                content.innerHTML = `<span>${col.label}</span>${FILTER_SVG}`;
                th.appendChild(content);
                th.style.fontSize = fontSize + 'px';
                th.dataset.key = col.key;
                if (columnFilters[col.key]) th.classList.add('filtered');
                th.addEventListener('click', (e) => {
                    if (e.target.closest('.filter-dropdown')) return;
                    openFilterDropdown(th, col.key);
                });
                headerRow.appendChild(th);
            });
            thead.appendChild(headerRow);

            renderRows();
            table.style.display = 'table';
        }

        function renderRows() {
            tbody.innerHTML = '';
            const filtered = applyColumnFilters(lastRecords);
            const selected = currentSelected.length ? currentSelected : getSelectedColumns();

            filtered.forEach(record => {
                const tr = document.createElement('tr');
                selected.forEach(col => {
                    const td = document.createElement('td');
                    td.textContent = record[col.key] ?? '';
                    td.style.fontSize = fontSize + 'px';
                    tr.appendChild(td);
                });
                tbody.appendChild(tr);
            });

            status.textContent = `Showing ${filtered.length} of ${lastRecords.length} records`;
        }

        colList.addEventListener('change', () => {
            saveColumnPrefs();
            if (lastRecords) renderTable();
        });

        // ========== VIEW TOGGLE ==========
        const tableView = document.getElementById('tableView');
        const dashboardView = document.getElementById('dashboardView');
        const pivotView = document.getElementById('pivotView');

        function switchView(view) {
            tableView.style.display = view === 'table' ? 'block' : 'none';
            dashboardView.style.display = view === 'dashboard' ? 'block' : 'none';
            pivotView.style.display = view === 'pivot' ? 'block' : 'none';
            if (view === 'dashboard' && lastRecords) buildDashboard();
            if (view === 'pivot' && lastRecords) buildPivot();
            updatePivotHScroll();
        }

        // ========== STICKY HORIZONTAL SCROLLBAR (PIVOT) ==========
        let pivotHScrollSyncing = false;
        let pivotHScrollTarget = null;
        function findPivotScrollTarget() {
            // Walk up from #pivotOutput to find the first ancestor that actually scrolls horizontally
            let el = document.getElementById('pivotOutput');
            while (el && el !== document.body) {
                if (el.scrollWidth > el.clientWidth + 1) {
                    const ovX = getComputedStyle(el).overflowX;
                    if (ovX === 'auto' || ovX === 'scroll') return el;
                }
                el = el.parentElement;
            }
            return null;
        }
        function ensurePivotHScroll() {
            let bar = document.getElementById('pivotHScroll');
            if (bar) return bar;
            bar = document.createElement('div');
            bar.id = 'pivotHScroll';
            bar.appendChild(document.createElement('div'));
            document.body.appendChild(bar);
            bar.addEventListener('scroll', () => {
                if (pivotHScrollSyncing || !pivotHScrollTarget) return;
                pivotHScrollSyncing = true;
                pivotHScrollTarget.scrollLeft = bar.scrollLeft;
                pivotHScrollSyncing = false;
            });
            window.addEventListener('resize', updatePivotHScroll);
            return bar;
        }
        function attachPivotScrollListener(target) {
            if (!target || target._pivotHScrollAttached) return;
            target._pivotHScrollAttached = true;
            target.addEventListener('scroll', () => {
                if (pivotHScrollSyncing) return;
                const bar = document.getElementById('pivotHScroll');
                if (!bar) return;
                pivotHScrollSyncing = true;
                bar.scrollLeft = target.scrollLeft;
                pivotHScrollSyncing = false;
            });
        }
        function updatePivotHScroll() {
            const pv = document.getElementById('pivotView');
            const bar = document.getElementById('pivotHScroll');
            if (!pv || pv.style.display === 'none') {
                if (bar) bar.style.display = 'none';
                return;
            }
            const target = findPivotScrollTarget();
            if (!target) {
                if (bar) bar.style.display = 'none';
                return;
            }
            pivotHScrollTarget = target;
            attachPivotScrollListener(target);
            const b = ensurePivotHScroll();
            const rect = target.getBoundingClientRect();
            const visibleBottom = Math.min(rect.bottom, window.innerHeight);
            b.style.left = rect.left + 'px';
            b.style.top = (visibleBottom - 14) + 'px';
            b.style.width = Math.min(rect.width, window.innerWidth - rect.left) + 'px';
            b.firstChild.style.width = target.scrollWidth + 'px';
            b.scrollLeft = target.scrollLeft;
            b.style.display = 'block';
        }
        // Re-measure after pivot DOM mutations (drag, expand, render)
        const _pivotObserver = new MutationObserver(() => {
            requestAnimationFrame(updatePivotHScroll);
        });
        _pivotObserver.observe(document.getElementById('pivotOutput'), { childList: true, subtree: true });

        document.querySelectorAll('input[name=view]').forEach(radio => {
            radio.addEventListener('change', (e) => switchView(e.target.value));
        });

        // ========== PIVOT ==========
        function buildPivot() {
            if (!lastRecords || lastRecords.length === 0) return;
            const el = document.getElementById('pivotOutput');
            try {
                const rt = document.querySelector('input[name=report_type]:checked').value;
                const cols = COLUMN_MAP[rt] || [];

                const data = lastRecords.map(record => {
                    const row = {};
                    cols.forEach(([key, label]) => { row[label] = record[key] ?? ''; });
                    return row;
                });

                $(el).empty();
                $(el).pivotUI(data, {
                    rows: [],
                    cols: [],
                    rendererName: "Table",
                    renderers: $.extend(
                        $.pivotUtilities.renderers,
                        $.pivotUtilities.plotly_renderers
                    ),
                }, true);
            } catch (e) {
                el.textContent = 'An error occurred rendering the PivotTable UI.';
                console.error('buildPivot error:', e);
            }
        }

        // ========== DASHBOARD ==========
        const COLORS = ['#3b82f6','#22c55e','#f59e0b','#f43f5e','#a855f7','#06b6d4','#ec4899','#84cc16','#f97316','#6366f1'];
        let chartInstances = [];

        const CARD_ICONS = {
            total: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8Z"/><path d="M14 2v6h6"/></svg>',
            completed: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>',
            pending: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>',
            time: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 22h14"/><path d="M5 2h14"/><path d="M17 22v-4.172a2 2 0 0 0-.586-1.414L12 12l-4.414 4.414A2 2 0 0 0 7 17.828V22"/><path d="M7 2v4.172a2 2 0 0 0 .586 1.414L12 12l4.414-4.414A2 2 0 0 0 17 6.172V2"/></svg>',
            sent: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>',
        };

        function getDashFilteredRecords() {
            if (!lastRecords) return [];
            return applyColumnFilters(lastRecords);
        }

        function updateDashFilterInfo(total, filtered) {
            const info = document.getElementById('dashFilterInfo');
            const activeFilters = Object.keys(columnFilters);
            if (activeFilters.length === 0) {
                info.textContent = '';
            } else {
                info.innerHTML = `Filtered: <strong style="color:#e2e8f0;">${filtered}</strong> of ${total} records (${activeFilters.length} filter active) — <a href="#" id="dashClearFilter" style="color:#3b82f6;">clear filters</a>`;
                document.getElementById('dashClearFilter').addEventListener('click', (e) => {
                    e.preventDefault();
                    columnFilters = {};
                    renderTable();
                    buildDashboard();
                });
            }
        }

        function themeColors() {
            const light = document.body.classList.contains('light');
            return {
                fg: light ? '#334155' : '#94a3b8',
                cardBg: light ? '#ffffff' : '#1e293b',
                grid: light ? '#e2e8f0' : '#334155',
                tooltipBg: light ? '#1e293b' : '#0f172a',
            };
        }

        function destroyCharts() { chartInstances.forEach(c => c.destroy()); chartInstances = []; }

        function countBy(records, key, top) {
            const counts = {};
            records.forEach(r => {
                const v = r[key];
                const label = (v == null || String(v).trim() === '') ? '(ว่าง)' : String(v);
                counts[label] = (counts[label] || 0) + 1;
            });
            let entries = Object.entries(counts).sort((a, b) => b[1] - a[1]);
            if (top) entries = entries.slice(0, top);
            return { labels: entries.map(e => e[0]), data: entries.map(e => e[1]) };
        }

        function avgTravelTime(records) {
            let total = 0, count = 0;
            records.forEach(r => {
                const t = r.travel_time; if (!t) return;
                const p = String(t).split(':');
                if (p.length === 2) { total += parseInt(p[0]) * 60 + parseInt(p[1]); count++; }
            });
            if (!count) return '-';
            const avg = Math.round(total / count), h = Math.floor(avg / 60), m = avg % 60;
            return h > 0 ? `${h}h ${m}m` : `${m}m`;
        }

        function addCard(container, value, label, color, icon) {
            const card = document.createElement('div');
            card.className = `dash-card ${color}`;
            card.innerHTML = `<div class="card-icon">${CARD_ICONS[icon] || CARD_ICONS.total}</div><div class="card-info"><span class="card-value">${value}</span><span class="card-label">${label}</span></div>`;
            container.appendChild(card);
        }

        function createDonut(container, title, labels, data) {
            const card = document.createElement('div');
            card.className = 'chart-card';
            card.innerHTML = `<h4>${title}</h4><div class="chart-wrap"><canvas></canvas></div>`;
            container.appendChild(card);
            const ctx = card.querySelector('canvas').getContext('2d');
            const t = themeColors();
            const chart = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels,
                    datasets: [{
                        data,
                        backgroundColor: COLORS.slice(0, data.length),
                        borderColor: t.cardBg,
                        borderWidth: 2,
                    }],
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    cutout: '60%',
                    plugins: {
                        legend: { position: 'right', labels: { color: t.fg, font: { size: 12 } } },
                        tooltip: { backgroundColor: t.tooltipBg, titleColor: '#e2e8f0', bodyColor: '#e2e8f0' },
                    },
                },
            });
            chartInstances.push(chart);
        }

        function createBar(container, title, labels, data) {
            const card = document.createElement('div');
            card.className = 'chart-card';
            card.innerHTML = `<h4>${title}</h4><div class="chart-wrap"><canvas></canvas></div>`;
            container.appendChild(card);
            const ctx = card.querySelector('canvas').getContext('2d');
            const t = themeColors();
            const chart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels,
                    datasets: [{
                        label: 'จำนวน',
                        data,
                        backgroundColor: '#3b82f6',
                        borderRadius: 4,
                        barPercentage: 0.75,
                    }],
                },
                options: {
                    indexAxis: 'y',
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { display: false },
                        tooltip: { backgroundColor: t.tooltipBg, titleColor: '#e2e8f0', bodyColor: '#e2e8f0' },
                    },
                    scales: {
                        x: { ticks: { color: t.fg }, grid: { color: t.grid } },
                        y: { ticks: { color: t.fg }, grid: { display: false } },
                    },
                },
            });
            chartInstances.push(chart);
        }

        function createTreemap(container, title, labels, data) {
            const card = document.createElement('div');
            card.className = 'chart-card';
            card.innerHTML = `<h4>${title}</h4><div class="chart-wrap"><canvas></canvas></div>`;
            container.appendChild(card);
            const ctx = card.querySelector('canvas').getContext('2d');
            const t = themeColors();
            const tree = labels.map((l, i) => ({ label: l, value: data[i] }));
            const chart = new Chart(ctx, {
                type: 'treemap',
                data: {
                    datasets: [{
                        tree,
                        key: 'value',
                        labels: {
                            display: true,
                            color: '#fff',
                            font: { size: 12 },
                            formatter: (c) => c.raw._data.label,
                        },
                        backgroundColor: (c) => c.type === 'data' ? COLORS[c.dataIndex % COLORS.length] : 'transparent',
                        borderColor: t.cardBg,
                        borderWidth: 1,
                    }],
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { display: false },
                        tooltip: {
                            backgroundColor: t.tooltipBg,
                            titleColor: '#e2e8f0',
                            bodyColor: '#e2e8f0',
                            callbacks: {
                                title: (items) => items[0].raw._data.label,
                                label: (item) => 'จำนวน: ' + item.raw.v,
                            },
                        },
                    },
                },
            });
            chartInstances.push(chart);
        }

        function buildDashboard() {
            if (!lastRecords || lastRecords.length === 0) return;
            destroyCharts();
            const cards = document.getElementById('dashCards');
            const charts = document.getElementById('dashCharts');
            cards.innerHTML = ''; charts.innerHTML = '';

            const rt = document.querySelector('input[name=report_type]:checked').value;
            const records = getDashFilteredRecords();
            updateDashFilterInfo(lastRecords.length, records.length);

            if (rt === 'enquiry') {
                const completed = records.filter(r => r.finish_dt && String(r.finish_dt).trim()).length;
                addCard(cards, records.length, 'Total Claims', 'blue', 'total');
                addCard(cards, completed, 'Completed', 'green', 'completed');
                addCard(cards, records.length - completed, 'Pending', 'amber', 'pending');
                addCard(cards, avgTravelTime(records), 'Avg Travel Time', 'rose', 'time');

                const s1 = countBy(records, 'stt_desc');
                createBar(charts, 'สถานะงาน', s1.labels, s1.data);
                const s2 = countBy(records, 'acc_province', 10);
                createBar(charts, 'จังหวัดที่เกิดเหตุ (Top 10)', s2.labels, s2.data);
                const s3 = countBy(records, 'claim_Type');
                createDonut(charts, 'ประเภทเคลม', s3.labels, s3.data);
                const s4 = countBy(records, 'acc_zone');
                createDonut(charts, 'เขตพื้นที่', s4.labels, s4.data);
                const s5 = countBy(records, 'branch', 10);
                createBar(charts, 'ศูนย์ (Top 10)', s5.labels, s5.data);
                const s6 = countBy(records, 'empcode', 10);
                createTreemap(charts, 'พนักงานตรวจสอบ (Top 10)', s6.labels, s6.data);
            } else {
                const sent = records.filter(r => r.sendReport_dt && String(r.sendReport_dt).trim()).length;
                addCard(cards, records.length, 'Total Closed', 'blue', 'total');
                addCard(cards, avgTravelTime(records), 'Avg Travel Time', 'green', 'time');
                addCard(cards, sent, 'Reports Sent', 'amber', 'sent');

                const c1 = countBy(records, 'empname', 10);
                createBar(charts, 'ผู้ปิดงาน (Top 10)', c1.labels, c1.data);
                const c2 = countBy(records, 'notified_name', 10);
                createBar(charts, 'ผู้รับแจ้ง (Top 10)', c2.labels, c2.data);
                const c3 = countBy(records, 'acc_place', 10);
                createTreemap(charts, 'สถานที่เกิดเหตุ (Top 10)', c3.labels, c3.data);
            }
        }

        // ========== EXPORT XLSX ==========
        const exportBtn = document.getElementById('exportBtn');
        exportBtn.addEventListener('click', () => {
            if (!lastRecords || lastRecords.length === 0) return;
            const selected = getSelectedColumns();
            if (selected.length === 0) return;
            const filtered = applyColumnFilters(lastRecords);
            const textCols = new Set(['claim_no']);

            const header = selected.map(c => c.label);
            const rows = filtered.map(record =>
                selected.map(col => record[col.key] ?? '')
            );
            const ws = XLSX.utils.aoa_to_sheet([header, ...rows]);

            // Force text format for textCols
            const textColIdx = [];
            selected.forEach((col, i) => { if (textCols.has(col.key)) textColIdx.push(i); });
            for (let r = 1; r <= filtered.length; r++) {
                textColIdx.forEach(c => {
                    const cell = ws[XLSX.utils.encode_cell({ r, c })];
                    if (cell) { cell.t = 's'; cell.v = String(cell.v); }
                });
            }

            // Auto column width
            ws['!cols'] = selected.map((col, i) => {
                let max = col.label.length;
                filtered.forEach(record => {
                    const len = String(record[col.key] ?? '').length;
                    if (len > max) max = len;
                });
                return { wch: Math.min(max + 2, 40) };
            });

            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, 'Report');
            const rt = document.querySelector('input[name=report_type]:checked').value;
            const df = document.getElementById('date_from').value;
            const dt = document.getElementById('date_to').value;
            XLSX.writeFile(wb, `SE_Report_${rt}_${df}_${dt}.xlsx`);
        });

        // ========== FORM SUBMIT (SSE STREAMING) ==========
        let abortController = null;
        const progressContainer = document.getElementById('progressContainer');
        const progressFill = document.getElementById('progressFill');
        const progressText = document.getElementById('progressText');

        document.getElementById('cancelBtn').addEventListener('click', () => {
            if (abortController) abortController.abort();
        });

        form.addEventListener('submit', async function (e) {
            e.preventDefault();
            status.className = '';
            status.textContent = '';
            thead.innerHTML = ''; tbody.innerHTML = '';
            table.style.display = 'none';
            btn.disabled = true;
            exportBtn.style.display = 'none';
            lastRecords = null;
            columnFilters = {};

            progressFill.style.width = '0%';
            progressText.textContent = 'Connecting...';
            progressContainer.classList.add('active');

            abortController = new AbortController();
            const formData = new FormData(this);

            try {
                const res = await fetch('/fetch-stream', {
                    method: 'POST',
                    body: formData,
                    signal: abortController.signal,
                });

                const reader = res.body.getReader();
                const decoder = new TextDecoder();
                let buffer = '';

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    buffer += decoder.decode(value, { stream: true });
                    const parts = buffer.split('\n\n');
                    buffer = parts.pop();

                    for (const part of parts) {
                        if (!part.trim()) continue;
                        let eventType = null, dataStr = null;
                        for (const line of part.split('\n')) {
                            if (line.startsWith('event: ')) eventType = line.slice(7).trim();
                            else if (line.startsWith('data: ')) dataStr = line.slice(6);
                        }
                        if (!eventType || !dataStr) continue;
                        const payload = JSON.parse(dataStr);

                        if (eventType === 'progress') {
                            const pct = payload.total > 0 ? Math.round((payload.fetched / payload.total) * 100) : 0;
                            progressFill.style.width = pct + '%';
                            progressText.textContent = `Page ${payload.page} — ${payload.fetched.toLocaleString()}/${payload.total.toLocaleString()} records (${pct}%)`;
                        } else if (eventType === 'error') {
                            throw new Error(payload.error);
                        } else if (eventType === 'done') {
                            const records = payload.data;
                            if (!records || records.length === 0) {
                                status.textContent = 'No data found.';
                            } else {
                                lastRecords = records;
                                renderTable();
                                exportBtn.style.display = 'inline-block';
                                const activeView = document.querySelector('input[name=view]:checked').value;
                                switchView(activeView);
                            }
                        }
                    }
                }
            } catch (err) {
                if (err.name === 'AbortError') {
                    status.textContent = 'Fetch cancelled.';
                } else {
                    status.className = 'error';
                    status.textContent = 'Error: ' + err.message;
                }
            } finally {
                btn.disabled = false;
                progressContainer.classList.remove('active');
                abortController = null;
            }
        });
    </script>
</body>
</html>
